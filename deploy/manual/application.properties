# ─────────────────────────────────────────────────────────────────────────────
#  DRDO GIS — editable configuration
#  This file is read fresh every time you start the app with run.bat.
#  Change a value here, save, and restart — you never rebuild anything.
# ─────────────────────────────────────────────────────────────────────────────

# --- Database -----------------------------------------------------------------
# These three MUST match the database and login role you created in pgAdmin.
# The app connects over the network (JDBC), the same way pgAdmin does — it does
# NOT use psql and does NOT need a terminal connected to the database.
#   url  = jdbc:postgresql://<host>:<port>/<database name>
#          (host/port are the ones pgAdmin shows under Properties > Connection;
#           usually localhost and 5432 — change the port below if yours differs)
spring.datasource.url=jdbc:postgresql://localhost:5432/drdo_gis
spring.datasource.username=drdo_user
spring.datasource.password=drdo_secret

# --- Web/UI port --------------------------------------------------------------
# The app (web UI + API) listens on THIS port. It is NOT hard-coded inside the jar —
# this line is the one and only place to set it. To move the app to another port
# (e.g. if 8080 is already in use), change the number below, save, and restart with
# run.bat. Then open the browser at http://localhost:<that port>.
server.port=8080

# --- Terrain data (optional) --------------------------------------------------
# run.bat already points these at this project's  data/  folder
# automatically. Only uncomment and set ABSOLUTE paths if DRDO's terrain files
# live somewhere else (Windows: use forward slashes, e.g. C:/drdo/terrain/dted):
# gis.terrain.dted-base-path=C:/drdo/terrain/dted
# gis.terrain.geotiff-base-path=C:/drdo/terrain/geotiff
# gis.terrain.default-base-map=india_basemap.tif
