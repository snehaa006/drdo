<div class="dep-form">
  <div class="dep-form__header">
    <span class="dep-form__title">DEPLOYMENT PARAMETERS</span>
    <button class="btn-icon" (click)="cancel.emit()" title="Close">✕</button>
  </div>

  <div class="dep-form__coords" *ngIf="centerLat !== null">
    <span class="label">LOCATION</span>
    <span class="value">{{ centerLat | number:'1.5-5' }}°N, {{ centerLon | number:'1.5-5' }}°E</span>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <label>Deployment Name</label>
      <input type="text" formControlName="name" placeholder="Optional" />
    </div>

    <div class="form-row">
      <label>Frontage (m)</label>
      <input type="number" formControlName="frontageM" min="10" max="5000" />
      <span class="err" *ngIf="form.get('frontageM')?.invalid && form.get('frontageM')?.touched">
        10–5000 m required
      </span>
    </div>

    <div class="form-row">
      <label>Depth (m)</label>
      <input type="number" formControlName="depthM" min="5" max="2000" />
      <span class="err" *ngIf="form.get('depthM')?.invalid && form.get('depthM')?.touched">
        5–2000 m required
      </span>
    </div>

    <div class="form-row">
      <label>Slope Threshold (°)</label>
      <input type="number" formControlName="slopeThresholdDegrees" min="0" max="90" step="0.5" />
    </div>

    <div class="form-row">
      <label>Heading (°)</label>
      <input type="number" formControlName="headingDegrees" min="0" max="360" />
    </div>

    <div class="form-row form-row--toggle">
      <label>Terrain Adaptive</label>
      <input type="checkbox" formControlName="terrainAdaptive" />
    </div>

    <div class="form-row form-row--toggle">
      <label>Bézier Smoothing</label>
      <input type="checkbox" formControlName="bezierSmoothing" />
    </div>

    <div class="dep-form__actions">
      <button type="button" class="btn btn--secondary" (click)="cancel.emit()">Cancel</button>
      <button type="submit" class="btn btn--primary" [disabled]="form.invalid || centerLat === null || loading">
        <span *ngIf="!loading">Compute Geometry</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </div>
  </form>
</div>
