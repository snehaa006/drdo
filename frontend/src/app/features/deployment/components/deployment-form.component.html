<div class="dep-form">
  <div class="dep-form__header">
    <span class="dep-form__title">DEPLOYMENT PARAMETERS</span>
    <button class="btn-icon" (click)="cancel.emit()" title="Close">✕</button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <label>Latitude (°N)</label>
      <input type="number" formControlName="centerLat" step="0.0001" min="-90" max="90"
             placeholder="e.g. 28.6139" />
      <span class="err" *ngIf="form.get('centerLat')?.invalid && form.get('centerLat')?.touched">
        enter −90 to 90
      </span>
    </div>

    <div class="form-row">
      <label>Longitude (°E)</label>
      <input type="number" formControlName="centerLon" step="0.0001" min="-180" max="180"
             placeholder="e.g. 77.2090" />
      <span class="err" *ngIf="form.get('centerLon')?.invalid && form.get('centerLon')?.touched">
        enter −180 to 180
      </span>
    </div>

    <div class="dep-form__hint">Type coordinates above, or click anywhere on the map to set the location.</div>

    <div class="form-row">
      <label>Deployment Name</label>
      <input type="text" formControlName="name" placeholder="Optional" />
    </div>

    <div class="form-row">
      <label>Frontage (m)</label>
      <input type="number" formControlName="frontageM" min="1" />
      <span class="err" *ngIf="form.get('frontageM')?.invalid && form.get('frontageM')?.touched">
        must be greater than 0
      </span>
    </div>

    <div class="form-row">
      <label>Depth (m)</label>
      <input type="number" formControlName="depthM" min="1" />
      <span class="err" *ngIf="form.get('depthM')?.invalid && form.get('depthM')?.touched">
        must be greater than 0
      </span>
    </div>

    <div class="form-row">
      <label>Slope Threshold (°)</label>
      <input type="number" formControlName="slopeThresholdDegrees" min="0" max="90" step="0.5" />
    </div>

    <div class="form-row">
      <label>Heading (°)</label>
      <input type="number" formControlName="headingDegrees" min="0" max="360" />
    </div>

    <div class="form-row form-row--toggle">
      <label>Terrain Adaptive</label>
      <input type="checkbox" formControlName="terrainAdaptive" />
    </div>

    <div class="form-row form-row--toggle">
      <label>Bézier Smoothing</label>
      <input type="checkbox" formControlName="bezierSmoothing" />
    </div>

    <div class="dep-form__actions">
      <button type="button" class="btn btn--secondary" (click)="cancel.emit()">Cancel</button>
      <button type="submit" class="btn btn--primary" [disabled]="form.invalid || loading">
        <span *ngIf="!loading">Compute Geometry</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </div>
  </form>
</div>
